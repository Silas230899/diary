<ion-footer class="toolbar">
    <ion-toolbar>
        <ion-buttons style="justify-content: center">
            <ion-button class="toolbarButton" (click)="navigate('home')" [color]="host === 'home' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="home-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        Home
                    </ion-label>
                </div>
            </ion-button>
            <ion-button class="toolbarButton" (click)="navigate('specific-day')" [color]="host === 'specific' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="today-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        Specific
                    </ion-label>
                </div>
            </ion-button>
            <ion-button class="toolbarButton" (click)="navigate('onboarding')" [color]="host === 'statistics' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="bar-chart-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        Stats
                    </ion-label>
                </div>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-footer>
