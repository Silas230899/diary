<ion-footer class="toolbar">
    <ion-toolbar>
        <ion-buttons>
            <ion-button class="toolbarButton" (click)="navigate('home')" [color]="host === 'home' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="home-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        An diesem Tag
                    </ion-label>
                </div>
            </ion-button>
            <ion-button class="toolbarButton" (click)="navigate('activity')" [color]="host === 'activity' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="flame-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        Aktivität
                    </ion-label>
                </div>
            </ion-button>
            <ion-button class="toolbarButton" (click)="navigate('search')" [color]="host === 'search' ? 'primary' : 'dark'">
                <div class="toolbarButtonWrapper">
                    <ion-icon name="search-outline" class="toolbarIcon"></ion-icon>
                    <ion-label class="toolbarLabel">
                        Suchen
                    </ion-label>
                </div>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-footer>
