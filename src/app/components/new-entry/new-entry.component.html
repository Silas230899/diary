<ion-header [translucent]="true">
    <ion-toolbar color="primary">
        <ion-buttons slot="start">
            <ion-button (click)="cancel()">
                <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Neuer Eintrag</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="confirm()" [strong]="true" [disabled]="text.length === 0">
                <ion-icon slot="icon-only" name="checkmark-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" [fullscreen]="true">
    Datum:
    <ion-datetime-button datetime="date" style="display: inline"></ion-datetime-button>

    <ion-modal [keepContentsMounted]="true">
        <ng-template>
            <ion-datetime id="date"
                          presentation="date"
                          [formatOptions]="{
                            date: {
                              weekday: 'long',
                              month: 'long',
                              day: '2-digit',
                            }
                          }"
                          [(ngModel)]="date"
            ></ion-datetime>
        </ng-template>
    </ion-modal>

    <br>

    Verfasst:
    <ion-datetime-button datetime="datetime" style="display: inline; margin-top: 8px"></ion-datetime-button>

    <ion-modal [keepContentsMounted]="true">
        <ng-template>
            <ion-datetime id="datetime"
                          presentation="date-time"
                          [formatOptions]="{
                            date: {
                              weekday: 'long',
                              month: 'long',
                              day: '2-digit',
                            },
                            time: {
                              hour: '2-digit',
                              minute: '2-digit',
                            }
                          }"
                          [(ngModel)]="written"
            ></ion-datetime>
        </ng-template>
    </ion-modal>

    <br>

    <ion-toggle [(ngModel)]="sync" style="margin-top: 8px">Synchronisieren</ion-toggle>

    @if (!sync) {
        <br>
        <ion-note style="margin-top: 8px">Dieser Eintrag wird nur lokal gespeichert</ion-note>
    }

    <br>

    <ion-textarea
            #textarea
            style="margin-top: 8px"
            autoGrow="true"
            rows="5"
            labelPlacement="floating"
            label="Eintrag"
            fill="outline"
            [(ngModel)]="text">
    </ion-textarea>

    <input type="file" id="file-upload" style="display: none" (change)="setImage($event)">

    @if (imagesViews.length === 0) {
        <br>
        <ion-button (click)="openFileDialog()">
            <ion-label>Bild</ion-label>
            <ion-icon slot="end" icon="camera"></ion-icon>
        </ion-button>
        <br>
    } @else {
        <br>
        <div class="imageContainer">
            <div id="addAnotherImageButtonContainer">
                <ion-button shape="round" fill="outline" size="large" (click)="openFileDialog()">
                    <ion-icon slot="icon-only" name="add"></ion-icon>
                </ion-button>
            </div>
            @for (img of imagesViews; track img.filename) {
                @if (img.localImageUrl === "") {
                    <ion-thumbnail><ion-skeleton-text [animated]="true"></ion-skeleton-text></ion-thumbnail>
                } @else {
                    <img [src]="img.localImageUrl" (click)="reference(img)">
                }
            }
        </div>
    }

    <!--
    <br>

    <ion-button fill="clear" (click)="confirm()" [disabled]="text.length === 0">
        Hinzufügen
    </ion-button>
    -->
</ion-content>
