<ion-header>
    <ion-toolbar color="primary">
        <ion-title>Home</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>

    @for (day of entries; track day) {
        <ion-card>
            <ion-card-header>
                <ion-card-title>{{formatDate(day[0].date)}}</ion-card-title>
            </ion-card-header>
            @for (entry of day; track entry.id) {
                <ion-card-header>
                    <ion-card-subtitle>Verfasst: {{formatDatetime(entry.date, entry.written)}}</ion-card-subtitle>
                </ion-card-header>

                <ion-card-content>
                    {{entry.text}}
                </ion-card-content>
            }
        </ion-card>
